<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResQRules — KBS Course Presentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Sans+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#CC0000; --primary-dark:#990000; --primary-tint:#FFEAEA;
    --success:#2D6A4F; --success-tint:#F0FAF5;
    --warning:#E85D04; --warning-text:#B54A00; --warning-tint:#FFF3EB;
    --ink:#1A1A1A; --ink-2:#4A4A4A; --ink-3:#6B6B6B;
    --border:#E0E0E0; --surface:#F5F5F5; --card:#FFFFFF;
    --r-sm:6px; --r-md:8px; --r-lg:12px;
    --shadow-1:0 2px 8px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{background:#1c1c1c; font-family:'Noto Sans',system-ui,sans-serif; color:var(--ink); overflow:hidden;}
  .mono{font-family:'Noto Sans Mono',ui-monospace,monospace;}

  #stage{position:absolute; left:50%; top:50%; width:1280px; height:720px;
         transform-origin:center center;}
  .slide{position:absolute; inset:0; width:1280px; height:720px; background:#fff;
         padding:34px 44px 24px; display:none; flex-direction:column;}
  .slide.active{display:flex;}
  .slide.brand{background:var(--primary); color:#fff;}

  /* shared */
  .kicker{font-size:14px; font-weight:600; letter-spacing:.13em; color:var(--primary); text-transform:uppercase;}
  .brand .kicker{color:#FFD6D6;}
  h1.t{font-size:34px; font-weight:700; line-height:1.22; margin:4px 0 18px;}
  .wordmark{background:var(--primary); color:#fff; font-weight:700; font-size:17px;
            padding:7px 14px; border-radius:var(--r-md); white-space:nowrap;}
  .headrow{display:flex; justify-content:space-between; align-items:flex-start;}
  .grow{flex:1; min-height:0;}
  .foot{display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:12px;}
  .cite{font-size:14px; color:var(--ink-2); background:var(--surface); border:1.5px solid var(--border);
        border-radius:999px; padding:4px 13px;}
  #pageno{position:fixed; right:18px; bottom:12px; color:#777; font-size:13px; z-index:9;}
  .cols{display:flex; gap:30px; min-height:0;}
  .card{background:var(--card); border:1.5px solid var(--border); border-radius:var(--r-lg);
        box-shadow:var(--shadow-1); padding:20px 22px;}
  .bullets{list-style:none; display:flex; flex-direction:column; gap:14px;}
  .bullets li{font-size:24px; line-height:1.45; padding-left:26px; position:relative;}
  .bullets li::before{content:""; position:absolute; left:0; top:12px; width:11px; height:11px;
                      border-radius:3px; background:var(--primary);}
  .bullets li b{font-weight:700;}
  .statement{font-size:28px; font-weight:700; color:var(--primary-dark);
             border-left:6px solid var(--primary); padding:10px 0 10px 20px; margin-top:18px;}
  .codebox{background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-md);
           padding:16px 18px; font-size:17px; line-height:1.55; white-space:pre; overflow:hidden;}
  .codebox .kw{color:var(--primary-dark); font-weight:600;}
  .codebox .cm{color:var(--ink-3);}
  .codebox .hl{background:var(--primary-tint); border-radius:3px; padding:0 3px; font-weight:600;}
  .chip{display:inline-block; font-size:15px; font-weight:600; border-radius:999px; padding:4px 14px;
        border:1.5px solid var(--border); background:var(--card); color:var(--ink-2);}
  .chip.red{border-color:var(--primary); color:var(--primary-dark); background:var(--primary-tint);}
  .chip.green{border-color:var(--success); color:var(--success); background:var(--success-tint);}
  .chip.warn{border-color:var(--warning-text); color:var(--warning-text); background:var(--warning-tint);}

  /* title + brand slides */
  .brandcenter{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:22px;}
  .brandcenter .logo{font-size:96px; font-weight:700; letter-spacing:-.01em;}
  .brandcenter .sub{font-size:27px; max-width:900px; line-height:1.5; color:#FFE2E2;}
  .brandcenter .meta{font-size:18px; color:#FFB9B9;}

  /* slide 2 paper chart */
  .paper{background:#FBF8F1; border:1.5px solid #E4DCC8; border-radius:4px; padding:18px;
         box-shadow:0 3px 14px rgba(0,0,0,.12); position:relative; width:430px;}
  .paper h5{font-size:12px; letter-spacing:.1em; color:#8A7F63; text-transform:uppercase; margin-bottom:10px;}
  .pbox{border:1.5px solid #B9AE8F; border-radius:3px; background:#fff; color:#5C5340;
        font-size:12.5px; padding:5px 8px; margin:0 auto 6px; width:86%; text-align:center;}
  .pbox.d{width:60%; border-style:dashed;}
  .parr{text-align:center; color:#B9AE8F; font-size:13px; line-height:1; margin-bottom:4px;}
  .youarehere{position:absolute; right:-14px; top:150px; background:var(--primary); color:#fff;
              font-size:14px; font-weight:600; padding:6px 12px; border-radius:var(--r-md);
              box-shadow:var(--shadow-1); transform:rotate(3deg);}

  /* pipeline */
  .pipe{display:flex; align-items:center; gap:14px; justify-content:center;}
  .pipe .step{border:2px solid var(--ink-2); border-radius:var(--r-lg); padding:16px 20px; text-align:center; background:#fff; min-width:170px;}
  .pipe .step b{display:block; font-size:20px;}
  .pipe .step span{font-size:14.5px; color:var(--ink-3);}
  .pipe .a{font-size:26px; color:var(--ink-3); font-weight:700;}

  /* phases lanes */
  .lanes{display:flex; gap:18px;}
  .lane{flex:1; border:2px solid var(--border); border-radius:var(--r-lg); padding:16px; background:#fff;}
  .lane .n{width:30px; height:30px; border-radius:50%; background:var(--ink-2); color:#fff; font-weight:700;
           display:flex; align-items:center; justify-content:center; font-size:16px; margin-bottom:10px;}
  .lane h4{font-size:20px; margin-bottom:6px;}
  .lane p{font-size:16.5px; color:var(--ink-2); line-height:1.45;}
  .exception{margin-top:20px; display:flex; align-items:center; gap:14px; background:var(--primary-tint);
             border:2px solid var(--primary); border-radius:var(--r-lg); padding:14px 18px;}
  .exception .q{font-size:20px; font-weight:700; color:var(--primary-dark);}
  .exception p{font-size:17px; color:var(--ink); line-height:1.4;}

  /* rejected wall */
  .rulewall{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; position:relative;}
  .rulewall .r{font-size:12.5px; background:var(--surface); border:1px solid var(--border);
               border-radius:4px; padding:5px 7px; color:var(--ink-3); white-space:nowrap; overflow:hidden;}
  .bigx{position:absolute; inset:-8px; display:flex; align-items:center; justify-content:center; pointer-events:none;}
  .bigx svg{width:100%; height:100%;}

  /* architecture diagram */
  .arch{display:flex; flex-direction:column; gap:14px; align-items:center;}
  .archrow{display:flex; gap:16px; align-items:stretch; justify-content:center;}
  .archbox{border:2px solid var(--ink-2); border-radius:var(--r-lg); padding:14px 18px; background:#fff; text-align:center;}
  .archbox h4{font-size:19px;} .archbox p{font-size:14.5px; color:var(--ink-3);}
  .archbox.k{border-color:var(--primary); background:var(--primary-tint);}
  .archbox.k h4{color:var(--primary-dark);}
  .jchip{font-size:13.5px; background:#fff; border:1.5px solid var(--primary); color:var(--primary-dark);
         border-radius:var(--r-sm); padding:3px 8px; margin:3px 2px; display:inline-block;}
  .statband{display:flex; gap:26px; justify-content:center; margin-top:8px;}
  .stat{text-align:center;}
  .stat b{font-size:44px; color:var(--primary); display:block; line-height:1.1;}
  .stat span{font-size:16px; color:var(--ink-2);}

  /* salience ladder */
  .ladder{display:flex; flex-direction:column; gap:10px;}
  .rung{display:flex; align-items:center; gap:14px; border:2px solid var(--border); border-radius:var(--r-md);
        padding:10px 16px; background:#fff;}
  .rung .sal{font-size:26px; font-weight:700; width:64px; text-align:right; color:var(--primary);}
  .rung .nm{font-size:19px; font-weight:600;} .rung .ds{font-size:15px; color:var(--ink-3);}
  .rung.base .sal{color:var(--ink-3);}
  .rung.r100{border-color:var(--primary);} .rung.r90{border-color:#E05555;} .rung.r80{border-color:#EFA1A1;}

  /* CF bar */
  .cfbar{position:relative; height:118px; margin:28px 10px 6px;}
  .cfline{position:absolute; left:0; right:0; top:56px; height:10px; border-radius:5px;
          background:linear-gradient(to right, var(--primary-tint) 0 74.5%, var(--success-tint) 74.5% 100%);
          border:1.5px solid var(--border);}
  .cfmark{position:absolute; top:0; transform:translateX(-50%); text-align:center; width:120px;}
  .cfmark span{font-size:16px; font-weight:600; display:block;}
  .cfmark em{font-style:normal; font-size:13.5px; color:var(--ink-3); display:block; margin-top:2px;}
  .cfmark i{display:block; width:16px; height:16px; border-radius:50%; margin:13px auto 0; border:3px solid #fff; box-shadow:0 0 0 1.5px var(--border);}
  .cfthresh{position:absolute; top:36px; height:44px; width:3px; background:var(--ink); left:74.5%;}
  .cfthresh span{position:absolute; top:-30px; left:-128px; width:120px; font-size:14.5px; font-weight:700; text-align:right;}

  /* ══ walkthrough tree (geometry = approved theme test slide) ══ */
  .tree{position:relative; width:856px; flex:none;}
  .tree svg.edges{position:absolute; inset:0; width:100%; height:100%; overflow:visible;}
  .chartlab{position:absolute; font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3);}
  .node{position:absolute; border-radius:var(--r-md); padding:8px 12px; font-size:17px; line-height:1.25;
        background:var(--card); display:flex; align-items:center; gap:8px;}
  .node .nid{display:block; font-size:11.5px; color:var(--ink-3); letter-spacing:.04em;}
  .node.visited{border:2px solid var(--ink-2); color:var(--ink); font-weight:600;}
  .node.current{border:2.5px solid var(--primary); background:var(--primary-tint); font-weight:700;
                box-shadow:0 0 0 5px rgba(204,0,0,.12), var(--shadow-1);}
  .node.current-good{border:2.5px solid var(--success); background:var(--success-tint); font-weight:700;
                box-shadow:0 0 0 5px rgba(45,106,79,.15), var(--shadow-1);}
  .node.future{border:1.5px solid var(--border); color:var(--ink-3); font-weight:400;}
  .node.q{justify-content:center; text-align:center;}
  .node.q::before{content:""; width:10px; height:10px; border:2.5px solid currentColor;
                  transform:rotate(45deg); border-radius:2px; flex:none; opacity:.8;}
  .node.stack{flex-direction:column; align-items:flex-start; gap:1px;}
  .node.leaf{border-radius:999px; justify-content:center; text-align:center;}
  .node.jump{border-style:dashed;}
  .tierbadge{position:absolute; width:28px; height:28px; border-radius:50%; background:var(--surface);
             border:1.5px solid var(--border); color:var(--ink-2); font-size:15px; font-weight:700;
             display:flex; align-items:center; justify-content:center;}
  .tierbadge.on{background:var(--primary); border-color:var(--primary); color:#fff;}
  .elabel{position:absolute; font-size:14px; font-weight:600; padding:3px 9px; border-radius:var(--r-sm);
          background:var(--card); display:flex; align-items:center; gap:5px; white-space:nowrap;}
  .elabel.yes{color:var(--primary); border:1.5px solid var(--primary);}
  .elabel.no{color:var(--success); border:1.5px solid var(--success); opacity:.85;}
  .elabel.dim{opacity:.42;}
  .elabel.hold{color:var(--warning-text); border:1.5px solid var(--warning-text); background:var(--warning-tint); font-size:13px;}
  .elabel.jumped{color:var(--ink-2); border:1.5px solid var(--ink-2); font-size:13px;}
  .glyph{width:13px; height:13px; flex:none;}

  .side{flex:1; background:var(--card); border:1.5px solid var(--border); border-radius:var(--r-lg);
        box-shadow:var(--shadow-1); padding:18px 18px 14px; display:flex; flex-direction:column; gap:13px; min-width:0;}
  .side h3{font-size:13px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
           border-bottom:1.5px solid var(--border); padding-bottom:8px;}
  .sec .lab{font-size:12px; font-weight:600; letter-spacing:.12em; color:var(--ink-3); text-transform:uppercase; margin-bottom:6px;}
  .fact{display:inline-block; font-size:16px; background:var(--surface); border:1.5px solid var(--border);
        border-radius:var(--r-sm); padding:4px 9px; margin:0 6px 6px 0; color:var(--ink-2);
        font-family:'Noto Sans Mono',monospace;}
  .fact.hot{background:var(--primary-tint); border-color:var(--primary); color:var(--primary-dark); font-weight:600;}
  .rule{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .rule .name{font-size:18px; font-weight:600; font-family:'Noto Sans Mono',monospace;}
  .sal{font-size:13px; font-weight:700; background:var(--surface); border:1.5px solid var(--border);
       border-radius:999px; padding:2px 10px; color:var(--ink-2);}
  .delta{font-size:16px; padding:3px 0; display:flex; gap:8px; align-items:baseline; font-family:'Noto Sans Mono',monospace;}
  .delta .op{width:16px; font-weight:700; text-align:center;}
  .delta.out{color:var(--ink-3); text-decoration:line-through;}
  .delta.out .op{text-decoration:none;}
  .delta.in{color:var(--primary-dark); font-weight:600;}
  .delta.in .op{color:var(--primary);}
  .delta .nt{font-family:'Noto Sans'; font-size:13px; color:var(--ink-3); text-decoration:none;}
  .trace{background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-md);
         padding:10px 12px; font-size:14px; line-height:1.5; color:var(--ink-2); white-space:pre-wrap;
         font-family:'Noto Sans Mono',monospace;}
  .trace b{color:var(--ink);}
  .src{font-size:12px; color:var(--ink-3); margin-top:5px;}
  .dots{display:flex; gap:7px; align-items:center;}
  .dots i{width:9px; height:9px; border-radius:50%; background:var(--border);}
  .dots i.done{background:var(--ink-2);}
  .dots i.now{background:var(--primary); width:11px; height:11px;}

  /* walkthrough slide sizing: tree is 856×545; pin everything so the foot never collides */
  .walk .cols{height:552px; flex:none;}
  .walk .tree{height:545px;}
  .walk .side{gap:10px; padding:15px 16px 12px; overflow:hidden;}
  .walk .side h3{font-size:12.5px; padding-bottom:6px;}
  .walk .sec .lab{font-size:11px; margin-bottom:4px;}
  .walk .fact{font-size:14.5px; padding:3px 8px;}
  .walk .rule .name{font-size:17px;}
  .walk .delta{font-size:15px;}
  .walk .trace{font-size:12.5px; padding:8px 10px;}
  .walk .src{font-size:11px;}
  .walk .foot{padding-top:8px;}
  .walk .votebtn{font-size:26px; padding:15px 10px; margin-bottom:10px;}

  /* C4 vote buttons */
  .votebtn{display:block; text-decoration:none; text-align:center; font-weight:700; font-size:30px;
           border-radius:var(--r-lg); padding:22px 10px; margin-bottom:14px; transition:transform .1s;}
  .votebtn:hover{transform:scale(1.03);}
  .votebtn.yes{background:var(--primary); color:#fff;}
  .votebtn.no{background:#fff; color:var(--success); border:2.5px solid var(--success);}
  .votebtn small{display:block; font-size:15px; font-weight:600; margin-top:4px; opacity:.85;}

  /* no-branch strip */
  .strip{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .strip .node{position:static;}
  .strip .sa{color:var(--ink-3); font-size:20px; font-weight:700;}

  /* phones */
  .phones{display:flex; gap:34px; justify-content:center;}
  .phone{width:212px; height:420px; border:3px solid var(--ink); border-radius:26px; background:#fff;
         overflow:hidden; display:flex; flex-direction:column; box-shadow:var(--shadow-1);}
  .phone .pbar{background:var(--primary); color:#fff; font-size:12.5px; font-weight:700; padding:9px 10px;}
  .phone .pbody{flex:1; padding:10px; font-size:12px; display:flex; flex-direction:column; gap:7px;}
  .phone .q{font-weight:600; font-size:12.5px; line-height:1.35;}
  .phone .opt{border:1.5px solid var(--border); border-radius:8px; padding:7px 8px; text-align:center; font-weight:600;}
  .phone .opt.sel{border-color:var(--primary); background:var(--primary-tint);}
  .phone .dpanel{background:var(--primary); display:flex; height:44px;}
  .phone .dpanel div{flex:1; color:#fff; font-size:8.5px; font-weight:700; display:flex; flex-direction:column;
                     align-items:center; justify-content:center; gap:2px; border-right:1px solid rgba(255,255,255,.25);}
  .phone .toast{background:var(--primary); color:#fff; border-radius:8px; padding:8px; font-size:11px; font-weight:600;}
  .phone .leafcard{background:var(--success-tint); border:1.5px solid var(--success); border-radius:8px;
                   padding:10px; color:var(--success); font-weight:700; font-size:12.5px;}
  .phcap{text-align:center; font-size:15px; color:var(--ink-2); margin-top:10px;}

  /* team */
  .teamrow{display:flex; gap:16px;}
  .tcard{flex:1; border:2px solid var(--border); border-radius:var(--r-lg); padding:16px 14px; text-align:center; background:#fff;}
  .tcard .av{width:56px; height:56px; border-radius:50%; background:var(--primary-tint); color:var(--primary-dark);
             font-weight:700; font-size:17px; display:flex; align-items:center; justify-content:center; margin:0 auto 10px;
             border:2px solid var(--primary);}
  .tcard b{font-size:18px; display:block; margin-bottom:5px;}
  .tcard p{font-size:14px; color:var(--ink-2); line-height:1.4;}
  .tcard .tag{font-size:12px; color:var(--primary-dark); font-weight:700; letter-spacing:.08em; text-transform:uppercase; display:block; margin-bottom:6px;}

  .hint{position:fixed; left:18px; bottom:12px; color:#777; font-size:13px; z-index:9;}

  @media print{
    body{background:#fff; overflow:visible;}
    #stage{position:static; transform:none !important; width:auto; height:auto;}
    .slide{display:flex !important; position:relative; page-break-after:always; margin:0;}
    .slide:last-of-type{page-break-after:auto;}
    #pageno,.hint{display:none;}
    @page{size:1280px 720px; margin:0;}
  }
</style>
</head>
<body>
<div id="stage"></div>
<div id="pageno"></div>
<div class="hint" id="hint">→ / ← navigate · F11 full screen · P print/PDF</div>

<!-- ═══════════════ STATIC SLIDES (templates cloned into #stage) ═══════════════ -->
<template id="slides">

<!-- s01 TITLE -->
<section class="slide brand" id="s01">
  <div class="brandcenter">
    <div class="logo">ResQRules</div>
    <div class="sub">A knowledge-based system that walks a first responder through
      Red&nbsp;Crescent emergency protocols — and reacts when the patient doesn't follow the flowchart.</div>
    <div class="meta">Knowledge-Based Systems · course project · built on the Experta forward-chaining engine</div>
    <div class="meta" style="margin-top:26px;">M.GH · M.SH · M.JA · M.Y.D · M.Marwan &nbsp;—&nbsp; supervised by Miss Omama</div>
  </div>
</section>

<!-- s02 PROBLEM -->
<section class="slide" id="s02">
  <div class="headrow"><div><div class="kicker">The problem</div>
    <h1 class="t">The patient doesn't follow the flowchart</h1></div>
    <div class="wordmark">ResQRules</div></div>
  <div class="cols grow">
    <div style="flex:none; display:flex; align-items:center;">
      <div class="paper">
        <h5>SARC SOP · Catastrophic Hemorrhage · chart #10</h5>
        <div class="pbox">Control of external bleeding: direct compression…</div>
        <div class="parr">↓</div>
        <div class="pbox d">Active bleeding?</div>
        <div class="parr">↓ yes</div>
        <div class="pbox">Second compression bandage on top of the first</div>
        <div class="parr">↓</div>
        <div class="pbox d">Active bleeding?</div>
        <div class="parr">↓ yes</div>
        <div class="pbox">Installation of tourniquet…</div>
        <div class="parr">↓</div>
        <div class="pbox">Urgent and safe transport…</div>
        <div class="youarehere">you are here…<br>but he just stopped breathing</div>
      </div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
      <ul class="bullets">
        <li>The Red Crescent SOP is <b>12 paper flowcharts</b> — expert, validated, and static.</li>
        <li>Under adrenaline, the responder must find the right chart, the right box, and follow the arrows correctly.</li>
        <li>Meanwhile the patient <b>deteriorates mid-protocol</b> — a new life threat appears while you're inside another box.</li>
      </ul>
      <div class="statement">Paper can't re-route. That gap is what we built.</div>
    </div>
  </div>
</section>

<!-- s03 WHAT IT IS -->
<section class="slide" id="s03">
  <div class="headrow"><div><div class="kicker">ResQRules</div>
    <h1 class="t">Protocols as software that reacts</h1></div>
    <div class="wordmark">ResQRules</div></div>
  <div class="grow" style="display:flex; flex-direction:column; justify-content:center; gap:44px;">
    <div class="pipe">
      <div class="step"><b>Experta engine</b><span>terminal Q&amp;A · the reasoning</span></div><div class="a">→</div>
      <div class="step"><b>FastAPI</b><span>stable REST contract</span></div><div class="a">→</div>
      <div class="step"><b>Flutter app</b><span>bilingual EN/AR · in the field</span></div>
    </div>

<span class="kw">@Rule</span>(AS.p &lt;&lt; <span class="hl">Position(nid=MATCH.nid)</span>,
      AS.a &lt;&lt; <span class="hl">Active(chart=MATCH.c)</span>,
      NOT(Bleeding()), <span class="kw">salience=0</span>)
<span class="kw">def</span> walk(self, p, a, nid, c):
    node = self.nodes[nid]      <span class="cm"># ← read from the JSON</span>
    …                           <span class="cm"># render node, ask the paramedic</span>
    self._move(p, a, next_id)   <span class="cm"># retract old Position,</span>
                                <span class="cm"># declare the new one → RETE re-matches</span></div>

function edgeSvg(states){

   +'<marker id="ah-v" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 Z" fill="#4A4A4A"/></marker>'

/* ═══════════ deck assembly + navigation ═══════════ */
const stage=document.getElementById('stage');
stage.innerHTML=document.getElementById('slides').innerHTML;
// insert walkthrough slides between s13 and s24
const s24=stage.querySelector('#s24');
const frag=WALK.map(walkSlide).join('')+noBranchSlide();
s24.insertAdjacentHTML('beforebegin',frag);

const slides=[...stage.querySelectorAll('.slide')];
const order=slides.map(s=>s.id);
let cur=0;
function show(i){
  cur=Math.max(0,Math.min(slides.length-1,i));
  slides.forEach((s,j)=>s.classList.toggle('active',j===cur));
  document.getElementById('pageno').textContent=(cur+1)+' / '+slides.length;
  if(location.hash!=='#'+order[cur]) history.replaceState(null,'','#'+order[cur]);
  document.getElementById('hint').style.display=cur===0?'block':'none';
}
function byHash(){
  const id=location.hash.slice(1);
  const i=order.indexOf(id);
  show(i>=0?i:0);
}
addEventListener('hashchange',byHash);
addEventListener('keydown',e=>{
  if(['ArrowRight',' ','PageDown'].includes(e.key)){e.preventDefault();show(cur+1);}
  else if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();show(cur-1);}
  else if(e.key==='Home')show(0);
  else if(e.key==='End')show(slides.length-1);
  else if(e.key==='p'||e.key==='P')print();
});
addEventListener('click',e=>{
  const a=e.target.closest('a[href^="#"]');
  if(a) return;                       // anchor links drive hashchange
});
function fit(){
  const k=Math.min(innerWidth/1280,innerHeight/720)*0.985;
  stage.style.transform=`translate(-50%,-50%) scale(${k})`;
}
addEventListener('resize',fit);
fit(); byHash();
</script>
